@if (isVisible) {
<section class="section" id="experience">
  <h3>Experience</h3>
  <div class="experience">
    @for (item of experience; track item.position) {
    <div>
      <p>
        {{ item.position }} <span class="sub-text">@</span> {{ item.company }}
      </p>
      <split-width-text [leftText]="item.location || ''">
        <date-range-display [dateRange]="item.dates"></date-range-display>
      </split-width-text>
      <highlight-list [highlights]="item.highlights || []"></highlight-list>
    </div>
    }
  </div>
</section>
}
